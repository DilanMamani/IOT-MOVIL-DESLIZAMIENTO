<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>

<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        
        .glass-panel {
            background: rgba(18, 25, 38, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid #1f2d44;
        }

        .glow-orange {
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.3);
        }

        .bg-tech-gradient {
            background: radial-gradient(circle at top right, #121926 0%, #090d16 100%);
        }

        input:focus + .input-icon {
            color: #ffb693;
        }
    </style>

          darkMode: "class",
          theme: {

                      "tertiary-fixed": "#ffdad7",
                      "tertiary-fixed-dim": "#ffb3ad",
                      "surface-container-high": "#262a34",
                      "primary": "#ffb693",
                      "outline-variant": "#5a4136",
                      "primary-fixed": "#ffdbcc",
                      "on-primary-fixed": "#351000",
                      "surface-bright": "#353943",
                      "on-secondary-fixed": "#002113",
                      "secondary-fixed": "#6ffbbe",
                      "tertiary-container": "#ff6762",
                      "tertiary": "#ffb3ad",
                      "on-secondary": "#003824",
                      "surface-tint": "#ffb693",
                      "on-primary": "#561f00",
                      "surface-container-highest": "#31353f",
                      "on-primary-fixed-variant": "#7a3000",
                      "surface-container": "#1c1f29",
                      "error-container": "#93000a",
                      "surface-container-low": "#181b25",
                      "primary-fixed-dim": "#ffb693",
                      "on-surface": "#dfe2ef",
                      "primary-container": "#ff6b00",
                      "secondary-container": "#00a572",
                      "on-error": "#690005",
                      "on-secondary-container": "#00311f",
                      "on-error-container": "#ffdad6",
                      "background": "#0f131c",
                      "surface-variant": "#31353f",
                      "on-tertiary-fixed": "#410004",
                      "inverse-primary": "#a04100",
                      "surface": "#0f131c",
                      "secondary-fixed-dim": "#4edea3",
                      "outline": "#a98a7d",

                      "on-background": "#dfe2ef",
                      "on-surface-variant": "#e2bfb0",

                      "on-tertiary-fixed-variant": "#930013",

                      "on-tertiary-container": "#6a000b",

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body-base overflow-hidden selection:bg-primary-container selection:text-white">
<!-- Ambient Background Animation (WebGL Shader Placeholder) -->
<div class="fixed inset-0 z-0">

<div class="absolute inset-0 bg-tech-gradient"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 min-h-screen flex flex-col justify-between px-margin-mobile pt-16 pb-12">
<!-- Logo Area -->
<header class="flex flex-col items-center space-y-4">
<div class="w-20 h-20 rounded-xl bg-surface-container flex items-center justify-center border border-outline-variant glow-orange">
<span class="material-symbols-outlined text-primary-container text-5xl" style="font-variation-settings: 'FILL' 1;">sensors</span>
</div>
<div class="text-center">
<h1 class="font-headline-md text-headline-md-mobile text-primary tracking-tight font-bold">TerraGuard</h1>
<p class="font-label-caps text-label-caps text-on-surface-variant opacity-70">SISTEMA DE MONITOREO DE ACTIVIDAD</p>
</div>
</header>
<!-- Form Section -->
<section class="w-full max-w-sm mx-auto space-y-6">
<div class="glass-panel p-lg rounded-xl space-y-6">
<div class="space-y-4">
<!-- Email Field -->
<div class="relative group">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-xs block ml-1" for="email">Correo Electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant input-icon transition-colors">alternate_email</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-low border border-outline-variant rounded-lg text-body-base focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all placeholder:text-on-surface-variant/40" id="email" placeholder="usuario@empresa.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="relative group">
<div class="flex justify-between items-center mb-xs px-1">
<label class="font-label-caps text-label-caps text-on-surface-variant block" for="password">Contraseña</label>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant input-icon transition-colors">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-low border border-outline-variant rounded-lg text-body-base focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all placeholder:text-on-surface-variant/40" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>
<!-- Forgot Password -->
<div class="text-right">
<a class="text-body-base text-primary hover:text-primary-fixed transition-colors underline-offset-4 hover:underline" href="#">
                        ¿Olvidaste tu contraseña?
                    </a>
</div>
<!-- Action Button -->
<button class="w-full h-[52px] bg-primary-container hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all rounded-full flex items-center justify-center text-on-primary font-body-bold text-body-bold shadow-lg glow-orange">
                    Iniciar Sesión
                </button>
</div>
<!-- New Account Link -->
<div class="text-center">
<p class="text-body-base text-on-surface-variant">
                    ¿No tienes una cuenta? 
                    <a class="text-primary font-body-bold hover:text-primary-fixed transition-colors underline-offset-4 hover:underline ml-1" href="#">Crear una cuenta</a>
</p>
</div>
</section>
<!-- Footer / Technical Specs -->
<footer class="text-center space-y-4">
<div class="flex items-center justify-center space-x-2 opacity-50">
<span class="material-symbols-outlined text-[14px]">verified_user</span>
<span class="font-label-caps text-label-caps">Cifrado de grado militar activo</span>
</div>
<div class="h-1 w-24 bg-surface-container-high mx-auto rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-1/3 animate-[loading_2s_infinite_linear]"></div>
</div>
</footer>
</main>
<style>
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
    </style>
<script>
        // Micro-interaction for the button
        const loginBtn = document.querySelector('button');
        loginBtn.addEventListener('click', () => {
            const originalContent = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span>';
            setTimeout(() => {
                loginBtn.innerHTML = originalContent;
            }, 1500);
        });

        // Floating particle effect for atmosphere
        const createParticle = () => {
            const particle = document.createElement('div');
            particle.className = 'fixed rounded-full pointer-events-none z-0 opacity-20';
            const size = Math.random() * 4 + 2 + 'px';
            particle.style.width = size;
            particle.style.height = size;
            particle.style.background = '#ffb693';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = '110vh';
            
            document.body.appendChild(particle);
            
            const animation = particle.animate([
                { transform: 'translateY(0) scale(1)', opacity: 0.2 },
                { transform: `translateY(-120vh) scale(0)`, opacity: 0 }
            ], {
                duration: Math.random() * 5000 + 5000,
                easing: 'linear'
            });
            
            animation.onfinish = () => particle.remove();
        };

        setInterval(createParticle, 800);
    </script>
</body></html>
